  /api/reports/staff-performance:
    get:
      tags: [Reports]
      summary: Staff performance — stages completed, earnings, attendance rate
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Staff performance

  /api/reports/order-status:
    get:
      tags: [Reports]
      summary: Current order status counts and stage queues
      responses:
        '200':
          description: Order status report

  /api/reports/pending-balances:
    get:
      tags: [Reports]
      summary: All orders with outstanding balance due
      responses:
        '200':
          description: Pending balance list

# ─────────────────────────────────────────────────────────────────────────────
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    idPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    shopIdPath:
      name: shopId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    page:
      name: page
      in: query
      schema:
        type: integer
        default: 1

    pageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        default: 20

  schemas:

    # ── Enums ──────────────────────────────────────────────────────────────

    ActiveStatus:
      type: string
      enum: [Inactive, Active]

    Gender:
      type: string
      enum: [Male, Female, Other]

    GarmentType:
      type: string
      enum: [ShalwarKameez, Suit, Sherwani, Coat, Trouser, Shirt, Frock, Lehnga, Kurta, Waistcoat, Other]

    OrderStatus:
      type: string
      enum: [Pending, Received, Cutting, Stitching, Embroidery, Finishing, TrialReady, TrialDone, ReadyToDeliver, PartiallyDelivered, Delivered, Cancelled, FullyPaid]

    OrderItemStatus:
      type: string
      enum: [Pending, InProgress, Done, Delivered, Cancelled]

    ProductionStage:
      type: string
      enum: [Cutting, Stitching, Embroidery, Ironing, Finishing, QualityCheck]

    PaymentMethod:
      type: string
      enum: [Cash, JazzCash, EasyPaisa, BankTransfer, Other]

    MeasurementUnit:
      type: string
      enum: [Inch, CM, MM]

    AttendanceStatus:
      type: string
      enum: [Present, Absent, HalfDay, Leave, Holiday]

    SubscriptionStatus:
      type: string
      enum: [Trial, Active, Suspended, Cancelled]

    # ── Auth ───────────────────────────────────────────────────────────────

    AuthLoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        phone:
          type: string
        passcode:
          type: string
          description: 4-digit PIN for phone+PIN login

    AuthTokenResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresAt:
          type: string
          format: date-time
        userName:
          type: string
        userId:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        shopId:
          type: string
          format: uuid
          description: Active branch — all data requests are scoped to this
        roles:
          type: array
          items:
            type: string

    SwitchBranchRequest:
      type: object
      required: [shopId]
      properties:
        shopId:
          type: string
          format: uuid
          description: Must be in the current user's ShopIds list

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string

    ChangePinRequest:
      type: object
      required: [currentPin, newPin]
      properties:
        currentPin:
          type: string
        newPin:
          type: string

    # ── Admin ──────────────────────────────────────────────────────────────

    ProvisionOwnerRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        phone:
          type: string
        passcode:
          type: string

    ProvisionOwnerResult:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string

    ProvisionShopRequest:
      type: object
      required: [userId, shopName]
      properties:
        userId:
          type: string
          format: uuid
          description: Domain UserId of the owner (from Step 1)
        shopName:
          type: string
        address:
          type: string
        city:
          type: string
        phone:
          type: string
        whatsAppNumber:
          type: string
        logoUrl:
          type: string
        currency:
          type: string
          default: PKR
        currencySymbol:
          type: string
          default: "₨"

    ProvisionShopResult:
      type: object
      properties:
        shopId:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        shopName:
          type: string

    ProvisionSubscriptionRequest:
      type: object
      properties:
        shopId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/SubscriptionStatus'
        trialDays:
          type: integer
          default: 14
        subscriptionEndsAt:
          type: string
          format: date-time
        planName:
          type: string

    ExtendSubscriptionRequest:
      type: object
      required: [days]
      properties:
        days:
          type: integer
          minimum: 1

    UpdateUserRoleRequest:
      type: object
      required: [newRole]
      properties:
        newRole:
          type: string

    # ── Shop ───────────────────────────────────────────────────────────────

    CreateShopViewModel:
      type: object
      required: [name]
      properties:
        name:
          type: string
        address:
          type: string
        city:
          type: string
        phone:
          type: string
        whatsAppNumber:
          type: string
        logoUrl:
          type: string
        currency:
          type: string
          default: PKR
        currencySymbol:
          type: string
          default: "₨"

    UpdateShopViewModel:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        address:
          type: string
        city:
          type: string
        phone:
          type: string
        whatsAppNumber:
          type: string
        logoUrl:
          type: string
        currency:
          type: string
        currencySymbol:
          type: string
        activeStatus:
          $ref: '#/components/schemas/ActiveStatus'

    ShopListViewModel:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        city:
          type: string
        phone:
          type: string
        activeStatus:
          $ref: '#/components/schemas/ActiveStatus'
        createdOn:
          type: string
          format: date-time

    ShopDetailViewModel:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        branchId:
          type: string
          format: uuid
          description: Always equals id (BranchId = ShopId rule)
        name:
          type: string
        address:
          type: string
        city:
          type: string
        phone:
          type: string
        whatsAppNumber:
          type: string
        logoUrl:
          type: string
        currency:
          type: string
        currencySymbol:
          type: string
        ownerId:
          type: string
          format: uuid
        ownerName:
          type: string
        activeStatus:
          $ref: '#/components/schemas/ActiveStatus'
        status:
          $ref: '#/components/schemas/SubscriptionStatus'
        trialEndsAt:
          type: string
          format: date-time
        subscriptionEndsAt:
          type: string
          format: date-time
        subscriptionPlanName:
          type: string
        createdOn:
          type: string
          format: date-time

    UpdateShopSubscriptionRequest:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/SubscriptionStatus'
        subscriptionEndsAt:
          type: string
          format: date-time
        subscriptionPlanName:
          type: string

    # ── User ───────────────────────────────────────────────────────────────

    CreateUserViewModel:
      type: object
      required: [name]
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        phone:
          type: string
        passcode:
          type: string
        roleIds:
          type: array
          items:
            type: string
            format: uuid
        shopIds:
          type: array
          items:
            type: string
            format: uuid

    UpdateUserViewModel:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        phone:
          type: string
        roleIds:
          type: array
          items:
            type: string
            format: uuid
        shopIds:
          type: array
          items:
            type: string
            format: uuid
        activeStatus:
          $ref: '#/components/schemas/ActiveStatus'

    UserListViewModel:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        roles:
          type: array
          items:
            type: string
        activeStatus:
          $ref: '#/components/schemas/ActiveStatus'
        lastLoginDate:
          type: string
          format: date-time

    UserDetailViewModel:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        roleIds:
          type: array
          items:
            type: string
            format: uuid
        roleNames:
          type: array
          items:
            type: string
        shopIds:
          type: array
          items:
            type: string
            format: uuid
        activeStatus:
          $ref: '#/components/schemas/ActiveStatus'
        lastLoginDate:
          type: string
          format: date-time
        loginCount:
          type: integer
        createdOn:
          type: string
          format: date-time

    # ── Customer ───────────────────────────────────────────────────────────

    CreateCustomerViewModel:
      type: object
      required: [name, phone]
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        city:
          type: string
        gender:
          $ref: '#/components/schemas/Gender'
        dateOfBirth:
          type: string
          format: date
        notes:
          type: string

    UpdateCustomerViewModel:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        city:
          type: string
        gender:
          $ref: '#/components/schemas/Gender'
        dateOfBirth:
          type: string
          format: date
        notes:
          type: string
        activeStatus:
          $ref: '#/components/schemas/ActiveStatus'

    CustomerListViewModel:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        phone:
          type: string
        city:
          type: string
        gender:
          $ref: '#/components/schemas/Gender'
        totalOrders:
          type: integer
        totalSpend:
          type: number
        loyaltyTier:
          type: string
        activeStatus:
          $ref: '#/components/schemas/ActiveStatus'

    CustomerDetailViewModel:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        city:
          type: string
        gender:
          $ref: '#/components/schemas/Gender'
        dateOfBirth:
          type: string
          format: date
        notes:
          type: string
        totalOrders:
          type: integer
        totalSpend:
          type: number
        loyaltyPoints:
          type: integer
        loyaltyTier:
          type: string
        activeStatus:
          $ref: '#/components/schemas/ActiveStatus'
        createdOn:
          type: string
          format: date-time

    CustomerLedgerViewModel:
      type: object
      properties:
        customerId:
          type: string
          format: uuid
        name:
          type: string
        phone:
          type: string
        totalGrand:
          type: number
        totalPaid:
          type: number
        totalDue:
          type: number
        orders:
          type: array
          items:
            type: object
            properties:
              orderId:
                type: string
                format: uuid
              orderNumber:
                type: string
              grandTotal:
                type: number
              amountPaid:
                type: number
              balanceDue:
                type: number
              status:
                type: string
              deliveryDate:
                type: string
                format: date-time

    # ── Measurement ────────────────────────────────────────────────────────

    CreateMeasurementFieldViewModel:
      type: object
      required: [name]
      properties:
        name:
          type: string
        unit:
          $ref: '#/components/schemas/MeasurementUnit'
        sortOrder:
          type: integer

    UpdateMeasurementFieldViewModel:
      type: object
      properties:
        name:
          type: string
        unit:
          $ref: '#/components/schemas/MeasurementUnit'
        sortOrder:
          type: integer

    CreateTemplateViewModel:
      type: object
      required: [name]
      properties:
        name:
          type: string
        garmentType:
          $ref: '#/components/schemas/GarmentType'
        isDefault:
          type: boolean
        displayOrder:
          type: integer
        fields:
          type: array
          items:
            $ref: '#/components/schemas/TemplateFieldItemViewModel'

    UpdateTemplateViewModel:
      type: object
      properties:
        name:
          type: string
        garmentType:
          $ref: '#/components/schemas/GarmentType'
        isDefault:
          type: boolean
        displayOrder:
          type: integer
        fields:
          type: array
          items:
            $ref: '#/components/schemas/TemplateFieldItemViewModel'

    TemplateFieldItemViewModel:
      type: object
      required: [measurementFieldId]
      properties:
        measurementFieldId:
          type: string
          format: uuid
        isRequired:
          type: boolean
        sortOrder:
          type: integer

    SaveMeasurementProfileViewModel:
      type: object
      required: [customerId, templateId, values]
      properties:
        customerId:
          type: string
          format: uuid
        templateId:
          type: string
          format: uuid
        profileName:
          type: string
          example: "Suit Measurements"
        values:
          type: object
          additionalProperties:
            type: number
          description: "Key = MeasurementFieldId (Guid), Value = numeric measurement"
          example:
            "3fa85f64-5717-4562-b3fc-2c963f66afa6": 42.5
        notes:
          type: string

    # ── Order ──────────────────────────────────────────────────────────────

    CreateOrderViewModel:
      type: object
      required: [customerId, deliveryDate, items]
      properties:
        customerId:
          type: string
          format: uuid
        deliveryDate:
          type: string
          format: date-time
        notes:
          type: string
        specialInstructions:
          type: string
        discount:
          type: number
          default: 0
        advancePayment:
          type: number
          default: 0
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethod'
        items:
          type: array
          items:
            $ref: '#/components/schemas/CreateOrderItemViewModel'

    CreateOrderItemViewModel:
      type: object
      required: [garmentType, price]
      properties:
        garmentType:
          $ref: '#/components/schemas/GarmentType'
        measurementProfileId:
          type: string
          format: uuid
          description: Use a saved customer profile (preferred)
        templateId:
          type: string
          format: uuid
          description: Or specify template for inline measurements
        inlineMeasurements:
          type: object
          additionalProperties:
            type: number
          description: FieldId -> value (used when no profileId provided)
        fabricDescription:
          type: string
        fabricColor:
          type: string
        styleNotes:
          type: string
        price:
          type: number
        qty:
          type: integer
          default: 1
        stageAssignments:
          type: array
          items:
            $ref: '#/components/schemas/CreateOrderItemStageAssignmentViewModel'

    CreateOrderItemStageAssignmentViewModel:
      type: object
      required: [stage]
      properties:
        stage:
          $ref: '#/components/schemas/ProductionStage'
        assignedKarigarId:
          type: string
          format: uuid
        stagePrice:
          type: number
        estimatedDays:
          type: integer

    UpdateOrderViewModel:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid
        deliveryDate:
          type: string
          format: date-time
        notes:
          type: string
        specialInstructions:
          type: string
        discount:
          type: number

    RecordOrderPaymentViewModel:
      type: object
      required: [amount]
      properties:
        amount:
          type: number
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethod'
        note:
          type: string
        paidAt:
          type: string
          format: date-time

    CreateOrderAlterationViewModel:
      type: object
      required: [orderItemId, description]
      properties:
        orderItemId:
          type: string
          format: uuid
        description:
          type: string
        additionalCharge:
          type: number
          default: 0
        deliveryDate:
          type: string
          format: date-time

    RecordStageLogViewModel:
      type: object
      required: [orderItemId, stage, karigarId]
      properties:
        orderItemId:
          type: string
          format: uuid
        stage:
          $ref: '#/components/schemas/ProductionStage'
        karigarId:
          type: string
          format: uuid
        notes:
          type: string

    CompleteStageViewModel:
      type: object
      required: [orderItemId, stage]
      properties:
        orderItemId:
          type: string
          format: uuid
        stage:
          $ref: '#/components/schemas/ProductionStage'
        notes:
          type: string

    AssignStageViewModel:
      type: object
      required: [orderItemId, stage, assignedKarigarId]
      properties:
        orderItemId:
          type: string
          format: uuid
        stage:
          $ref: '#/components/schemas/ProductionStage'
        assignedKarigarId:
          type: string
          format: uuid
        stagePrice:
          type: number
        estimatedDays:
          type: integer

    OrderListViewModel:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orderNumber:
          type: string
        customerId:
          type: string
          format: uuid
        customerName:
          type: string
        customerPhone:
          type: string
        itemCount:
          type: integer
        grandTotal:
          type: number
        amountPaid:
          type: number
        balanceDue:
          type: number
        status:
          $ref: '#/components/schemas/OrderStatus'
        deliveryDate:
          type: string
          format: date-time
        createdOn:
          type: string
          format: date-time

    OrderDetailViewModel:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orderNumber:
          type: string
        customerId:
          type: string
          format: uuid
